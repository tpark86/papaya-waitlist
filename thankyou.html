  <!-- JAVASCRIPT                                                   -->
  <!-- ============================================================ -->
  <script>
    // Read position from URL
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('position');
    const n = parseInt(raw, 10);
    if (!isNaN(n) && n > 0) {
      document.getElementById('position-display').textContent = '#' + n.toLocaleString();
    } else {
      document.getElementById('position-display').textContent = "You're in!";
    }

    // Share URL helper — guards against file:// returning "null"
    function getShareUrl() {
      if (window.location.protocol === 'file:') {
        return 'https://YOUR_DOMAIN_HERE/index.html'; // TODO: replace before launch
      }
      return window.location.href.replace(/thankyou\.html.*$/, 'index.html');
    }

    // Fallback copy for browsers/contexts where clipboard API is unavailable
    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
    }

    // Copy discount code
    function copyCode(btn) {
      const text = 'PAPAYA10';
      function onCopied() {
        const original = btn.innerHTML;
        btn.innerHTML = '복사됨!';
        setTimeout(() => { btn.innerHTML = original; }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onCopied).catch(() => { fallbackCopy(text); onCopied(); });
      } else {
        fallbackCopy(text);
        onCopied();
      }
    }

    // Share helpers
    function shareKakao() {
      const url = getShareUrl();
      const msg = '카카오톡으로 링크를 붙여넣기 해서 친구들에게 공유하세요!\n\n' + url;
      fallbackCopy(url);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
          alert('링크가 복사되었어요! 카카오톡에 붙여넣기 해서 친구에게 공유하세요 🎉');
        }).catch(function() {
          alert('카카오톡에서 공유하려면 이 링크를 복사해 붙여넣으세요:\n' + url);
        });
      } else {
        fallbackCopy(url);
        alert('카카오톡에서 공유하려면 이 링크를 복사해 붙여넣으세요:\n' + url);
      }
    }

    function shareInstagram() {
      const url = getShareUrl();
      function onCopied() { alert('링크가 복사되었어요! 인스타그램 스토리에 붙여넣기 해서 공유하세요 🎉'); }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(onCopied).catch(() => { fallbackCopy(url); onCopied(); });
      } else {
        fallbackCopy(url);
        onCopied();
      }
    }

    function copyLink(btn) {
      const url = getShareUrl();
      function onCopied() {
        btn.innerHTML = '<span class="material-symbols-outlined text-base">check</span> 복사됨!';
        setTimeout(() => { btn.innerHTML = '<span class="material-symbols-outlined text-base">link</span> 링크 복사'; }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(onCopied).catch(() => { fallbackCopy(url); onCopied(); });
      } else {
        fallbackCopy(url);
        onCopied();
      }
    }
  </script>
