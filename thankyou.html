  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
    .sticker-border {
      outline: 4px solid #bbb9b0;
    }
    * {
      word-break: keep-all;
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* Pop-in animation */
    @keyframes pop-in {
      0%   { transform: scale(0.5) rotate(-8deg); opacity: 0; }
      70%  { transform: scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .pop-in {
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .pop-in-delay-1 { animation-delay: 0.1s; }
    .pop-in-delay-2 { animation-delay: 0.2s; }
    .pop-in-delay-3 { animation-delay: 0.35s; }
  </style>

<body class="bg-surface font-body text-on-surface overflow-x-hidden min-h-screen">

  <!-- ============================================================ -->
  <!-- 1. MINIMAL NAV                                               -->
  <!-- ============================================================ -->
  <nav class="w-full bg-[#fcf5e5]/80 backdrop-blur-md shadow-[0_8px_24px_rgba(56,56,49,0.06)] overflow-visible" style="height:69px;">
    <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-center">
      <a href="index.html" class="inline-block">
        <img src="logo.webp?v=4" alt="papaya" width="1024" height="1024" class="w-auto" style="height:276px; object-fit: contain; object-position: center;">
      </a>
    </div>
  </nav>

  <!-- ============================================================ -->
  <!-- MAIN CONTENT                                                 -->
  <!-- ============================================================ -->
  <main class="max-w-xl mx-auto px-6 py-12 flex flex-col items-center gap-8">

    <!-- ============================================================ -->
    <!-- 2. CELEBRATION HEADER                                        -->
    <!-- ============================================================ -->
    <div class="text-center space-y-4 pop-in">
      <div
        class="text-8xl leading-none"
        role="img"
        aria-label="party popper"
      >🎉</div>
      <h1 class="text-3xl md:text-4xl font-headline font-black text-on-surface leading-tight">
        파파야 놀이터에 입장했어요!
      </h1>
    </div>

    <!-- ============================================================ -->
    <!-- 3. QUEUE POSITION CARD                                       -->
    <!-- ============================================================ -->
    <div
      class="pop-in pop-in-delay-1 w-full bg-card rounded-xl sticker-border shadow-[0_12px_36px_rgba(56,56,49,0.10)] rotate-[1deg] p-8 text-center space-y-2"
      style="transform-origin: center;"
    >
      <p class="text-xs font-headline font-bold uppercase tracking-widest text-on-surface-muted">내 순번</p>
      <p
        id="position-display"
        class="text-6xl md:text-7xl font-headline font-black text-primary leading-none"
        aria-live="polite"
      >#—</p>
      <p class="text-base text-on-surface font-body font-medium">출시되면 가장 먼저 알려드릴게요</p>
    </div>

    <!-- ============================================================ -->
    <!-- 4. DISCOUNT CODE CARD                                        -->
    <!-- ============================================================ -->
    <div
      class="pop-in pop-in-delay-2 w-full rounded-xl shadow-[0_12px_36px_rgba(0,0,0,0.15)] -rotate-[1deg] p-8 text-center space-y-4"
      style="background: #00743c; transform-origin: center;"
    >
      <p class="text-xs font-headline font-bold uppercase tracking-widest text-white/70">나만의 할인 코드</p>
      <p class="text-4xl md:text-5xl font-headline font-black text-white tracking-[0.15em] font-mono">PAPAYA10</p>
      <button
        id="copy-btn"
        type="button"
        onclick="copyCode(this)"
        aria-label="Copy discount code PAPAYA10"
        class="bg-white text-secondary font-headline font-extrabold text-sm px-6 py-2.5 rounded-full hover:bg-surface-low transition-colors shadow-sm"
      >
        복사하기
      </button>
      <p class="text-xs text-white/70 font-body">출시 시 첫 스타터팩 10% 할인</p>
    </div>

    <!-- ============================================================ -->
    <!-- 5. SHARE SECTION                                             -->
    <!-- ============================================================ -->
    <div
      class="pop-in pop-in-delay-3 w-full bg-surface-low rounded-xl sticker-border p-8 space-y-5"
      style="transform-origin: center;"
    >
      <div class="text-center space-y-1">
        <h2 class="text-xl font-headline font-black text-on-surface">순번을 앞당겨보세요!</h2>
        <p class="text-sm text-on-surface-muted font-body leading-relaxed">
          친구를 초대할 때마다 순번이 앞으로 당겨져요.
        </p>
      </div>

      <!-- Share buttons row (stacks on mobile) -->
      <div class="flex flex-col sm:flex-row gap-3">

        <!-- KakaoTalk -->
        <button
          type="button"

  <!-- JAVASCRIPT                                                   -->
  <!-- ============================================================ -->
  <script>
    // Read position from URL
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('position');
    const n = parseInt(raw, 10);
    if (!isNaN(n) && n > 0) {
      document.getElementById('position-display').textContent = '#' + n.toLocaleString();
    } else {
      document.getElementById('position-display').textContent = "You're in!";
    }

    // Share URL helper — guards against file:// returning "null"
    function getShareUrl() {
      if (window.location.protocol === 'file:') {
        return 'https://YOUR_DOMAIN_HERE/index.html'; // TODO: replace before launch
      }
      return window.location.href.replace(/thankyou\.html.*$/, 'index.html');
    }

    // Fallback copy for browsers/contexts where clipboard API is unavailable
    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
    }

    // Copy discount code
    function copyCode(btn) {
      const text = 'PAPAYA10';
      function onCopied() {
        const original = btn.innerHTML;
        btn.innerHTML = '복사됨!';
        setTimeout(() => { btn.innerHTML = original; }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(onCopied).catch(() => { fallbackCopy(text); onCopied(); });
      } else {
        fallbackCopy(text);
        onCopied();
      }
    }

    // Share helpers
    function shareKakao() {
      const url = getShareUrl();
      const msg = '카카오톡으로 링크를 붙여넣기 해서 친구들에게 공유하세요!\n\n' + url;
      fallbackCopy(url);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
          alert('링크가 복사되었어요! 카카오톡에 붙여넣기 해서 친구에게 공유하세요 🎉');
        }).catch(function() {
          alert('카카오톡에서 공유하려면 이 링크를 복사해 붙여넣으세요:\n' + url);
        });
      } else {
        fallbackCopy(url);
        alert('카카오톡에서 공유하려면 이 링크를 복사해 붙여넣으세요:\n' + url);
      }
    }

    function shareInstagram() {
      const url = getShareUrl();
      function onCopied() { alert('링크가 복사되었어요! 인스타그램 스토리에 붙여넣기 해서 공유하세요 🎉'); }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(onCopied).catch(() => { fallbackCopy(url); onCopied(); });
      } else {
        fallbackCopy(url);
        onCopied();
      }
    }

    function copyLink(btn) {
      const url = getShareUrl();
      function onCopied() {
        btn.innerHTML = '<span class="material-symbols-outlined text-base">check</span> 복사됨!';
        setTimeout(() => { btn.innerHTML = '<span class="material-symbols-outlined text-base">link</span> 링크 복사'; }, 2000);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(onCopied).catch(() => { fallbackCopy(url); onCopied(); });
      } else {
        fallbackCopy(url);
        onCopied();
      }
    }
  </script>

</body>
